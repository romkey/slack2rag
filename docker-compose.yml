services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama provides embedding models.  Pull your model after first start:
  #   docker compose exec ollama ollama pull nomic-embed-text
  # If you already have Ollama running on the host, comment this out and
  # set OLLAMA_URL=http://host.docker.internal:11434 in .env instead.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  slack2rag:
    # Use the pre-built image from GHCR when available, otherwise build locally.
    # Override with:  IMAGE=ghcr.io/you/slack2rag:latest docker compose up
    image: ${IMAGE:-}
    build: .
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    volumes:
      - slack2rag_state:/data
    restart: unless-stopped

  # One-shot query tool — not started by default.
  # Usage:
  #   docker compose run --rm query "how do I reset my password?"
  #   docker compose run --rm query --limit 10 --channel engineering "deploy process"
  #   docker compose run --rm query --date-from 2024-06-01 "incident postmortem"
  query:
    image: ${IMAGE:-}
    build: .
    profiles: [query]
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    command: ["python", "-m", "src.query"]

volumes:
  qdrant_data:
  slack2rag_state:
  ollama_data:
